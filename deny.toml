[graph]
# The fuzz crate is a standalone workspace; only check the main crate.
exclude = ["safe-read-fuzz"]

# safe-read has zero runtime dependencies (no_std, no deps), so the license set
# is just its own Apache-2.0. cargo-deny v2: anything not in `allow` is denied.
[licenses]
allow = ["MIT", "Apache-2.0"]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "deny"

[advisories]
version = 2
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
ignore = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
